<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatchTable Global — App Push Plan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f6fa;
    color: #2d3436;
    line-height: 1.6;
  }
  .header {
    background: #fff;
    border-bottom: 1px solid #e9ecef;
    padding: 28px 40px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .header p { font-size: 13px; color: #868e96; margin-top: 4px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

  .section {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e9ecef;
    padding: 28px;
    margin-bottom: 24px;
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .section-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .section-desc { font-size: 12px; color: #868e96; }

  .btn {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid #dee2e6;
    background: #fff;
    color: #495057;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
  }
  .btn:hover { background: #f8f9fa; }
  .btn-primary { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .btn-primary:hover { background: #2d2d44; }
  .btn-danger { color: #c92a2a; border-color: #ffc9c9; }
  .btn-danger:hover { background: #fff5f5; }
  .btn-group { display: flex; gap: 6px; flex-shrink: 0; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table thead th {
    background: #f8f9fa;
    font-weight: 600;
    color: #495057;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 2px solid #dee2e6;
    white-space: nowrap;
  }
  .data-table tbody td {
    padding: 9px 12px;
    text-align: left;
    border-bottom: 1px solid #f1f3f5;
  }
  .data-table tbody tr:hover td { background: #f8f9fa; }

  /* editable cell */
  .data-table td[contenteditable="true"] {
    outline: none;
    border: 1px solid #d0ebff;
    background: #f0f7ff !important;
    border-radius: 2px;
  }
  .data-table.editing td { cursor: text; }
  .data-table.editing tr:hover td { background: #f0f7ff; }

  /* month group */
  .month-group td {
    background: #f0f1f3 !important;
    font-weight: 700;
    color: #1a1a2e;
    padding: 8px 12px;
    border-bottom: 1px solid #dee2e6;
  }

  /* type badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-season { background: #fff3bf; color: #e67700; }
  .badge-trend { background: #d3f9d8; color: #2b8a3e; }
  .badge-new { background: #d0ebff; color: #1971c2; }
  .badge-promo { background: #ffe0e0; color: #c92a2a; }
  .badge-engage { background: #e8dff5; color: #7048e8; }
  .badge-reservation { background: #fff4e6; color: #d9480f; }
  .badge-waiting { background: #e3fafc; color: #0c8599; }
  .badge-post { background: #f3f0ff; color: #7048e8; }

  /* type select in edit mode */
  .type-select {
    font-size: 11px;
    padding: 2px 6px;
    border: 1px solid #dee2e6;
    border-radius: 4px;
    background: #fff;
    font-weight: 600;
  }

  /* tip box */
  .tip-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }
  .tip-card {
    background: #f8f9fa;
    border: 1px solid #e9ecef;
    border-radius: 8px;
    padding: 16px;
  }
  .tip-card strong {
    display: block;
    font-size: 13px;
    color: #1a1a2e;
    margin-bottom: 4px;
  }
  .tip-card span {
    font-size: 12px;
    color: #868e96;
  }

  /* row actions in edit mode */
  .row-actions { white-space: nowrap; }
  .row-actions button {
    font-size: 11px; padding: 2px 6px; border: none; background: none;
    cursor: pointer; color: #868e96; border-radius: 3px;
  }
  .row-actions button:hover { background: #f1f3f5; color: #c92a2a; }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1a1a2e; color: #fff; padding: 12px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>

  '리인게이지먼트 (재방문 유도)': 'badge-engage',
  '예약 확정': 'badge-reservation', '예약 리마인드': 'badge-reservation', '예약 변경/취소': 'badge-reservation',
  '웨이팅 접수': 'badge-waiting', '웨이팅 순서 임박': 'badge-waiting', '웨이팅 호출': 'badge-waiting',
  '방문 후 리뷰 유도': 'badge-post', '방문 후 재방문 유도': 'badge-post',
};
function badge(t) { return `<span class="badge ${BADGE_MAP[t]||''}">${t}</span>`; }

// ── PLAN TYPE OPTIONS (for select dropdown) ──
const PLAN_TYPES = ['시즌', '트렌드', '신규', '프로모션'];

// ── RENDER ──
function renderTable(id, data, opts = {}) {
  const table = document.getElementById(id);
  const { monthGroup } = opts;
  let html = '<thead><tr>';
  data.headers.forEach(h => { html += `<th>${h}</th>`; });
  html += '</tr></thead><tbody>';

  let prevMonth = '';
  data.rows.forEach((r, ri) => {
    if (monthGroup && r[0] !== prevMonth && r[0]) {
      html += `<tr class="month-group"><td colspan="${data.headers.length}">${r[0]}</td></tr>`;
      prevMonth = r[0];
    }
    html += `<tr data-row="${ri}">`;
    r.forEach((c, ci) => {
      if (ci === 0 && monthGroup) html += `<td data-col="${ci}">${c}</td>`;
      else if ((ci === 0 && !monthGroup) || (ci === 1 && monthGroup)) html += `<td data-col="${ci}">${badge(c)}</td>`;
      else html += `<td data-col="${ci}">${c}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function renderTips(id, tips) {
  const el = document.getElementById(id);
  el.innerHTML = tips.map(t => `<div class="tip-card"><strong>${t[0]}</strong><span>${t[1]}</span></div>`).join('');
}

// ── EDIT MODE ──
const editStates = {};

function toggleEdit(id) {
  const table = document.getElementById(id);
  const isEditing = editStates[id];
  const dataKey = { 'mkt-types': 'marketingTypes', 'monthly-plan': 'monthlyPlan', 'txn-types': 'transactionTypes' }[id];
  const data = DATA[dataKey];
  const isMonthly = id === 'monthly-plan';

  if (isEditing) {
    // Save: read from DOM back to DATA
    const tbody = table.querySelector('tbody');
    const dataRows = tbody.querySelectorAll('tr:not(.month-group)');
    dataRows.forEach((tr, ri) => {
      tr.querySelectorAll('td').forEach(td => {
        const ci = parseInt(td.dataset.col);
        if (ci === undefined || isNaN(ci)) return;
        const select = td.querySelector('select');
        if (select) {
          data.rows[ri][ci] = select.value;
        } else {
          data.rows[ri][ci] = td.textContent.trim();
        }
      });
      // remove action column
      const actionTd = tr.querySelector('.row-actions');
      if (actionTd) actionTd.remove();
    });
    // Re-render
    renderTable(id, data, { monthGroup: isMonthly });
    table.classList.remove('editing');
    editStates[id] = false;
    showToast('저장 완료');
  } else {
    // Enter edit mode
    table.classList.add('editing');
    const tbody = table.querySelector('tbody');
    const dataRows = tbody.querySelectorAll('tr:not(.month-group)');
    // Add action header
    const thead = table.querySelector('thead tr');
    const actionTh = document.createElement('th');
    actionTh.textContent = '';
    actionTh.style.width = '40px';
    thead.appendChild(actionTh);

    dataRows.forEach((tr, ri) => {
      tr.querySelectorAll('td').forEach(td => {
        const ci = parseInt(td.dataset.col);
        if (ci === undefined || isNaN(ci)) return;
        // Type column: dropdown
        const isTypeCol = (isMonthly && ci === 1) || (!isMonthly && ci === 0);
        if (isTypeCol && isMonthly) {
          const cur = data.rows[ri][ci];
          td.innerHTML = `<select class="type-select" data-col="${ci}">${PLAN_TYPES.map(t => `<option${t===cur?' selected':''}>${t}</option>`).join('')}</select>`;
        } else {
          td.contentEditable = 'true';
          // Remove badge wrapper for display
          const badgeEl = td.querySelector('.badge');
          if (badgeEl) td.textContent = badgeEl.textContent;
        }
      });
      // Add delete button
      const actionTd = document.createElement('td');
      actionTd.className = 'row-actions';
      actionTd.innerHTML = `<button onclick="deleteRow('${id}', ${ri})" title="삭제">✕</button>`;
      tr.appendChild(actionTd);
    });
    editStates[id] = true;
    showToast('수정 모드 — 셀을 클릭해서 편집하세요');
  }

  // Update button text
  const btn = table.closest('.section').querySelector('.btn');
  btn.textContent = editStates[id] ? '저장' : '수정';
  if (editStates[id]) { btn.classList.add('btn-primary'); } else { btn.classList.remove('btn-primary'); }
}

function deleteRow(id, rowIndex) {
  const dataKey = { 'mkt-types': 'marketingTypes', 'monthly-plan': 'monthlyPlan', 'txn-types': 'transactionTypes' }[id];
  const data = DATA[dataKey];
  const isMonthly = id === 'monthly-plan';

  // First save current edits
  const table = document.getElementById(id);
  const tbody = table.querySelector('tbody');
  const dataRows = tbody.querySelectorAll('tr:not(.month-group)');
  dataRows.forEach((tr, ri) => {
    tr.querySelectorAll('td').forEach(td => {
      const ci = parseInt(td.dataset.col);
      if (ci === undefined || isNaN(ci)) return;
      const select = td.querySelector('select');
      if (select) data.rows[ri][ci] = select.value;
      else if (td.contentEditable === 'true') data.rows[ri][ci] = td.textContent.trim();
    });
  });

  data.rows.splice(rowIndex, 1);
  editStates[id] = false;
  renderTable(id, data, { monthGroup: isMonthly });
  // Re-enter edit mode
  toggleEdit(id);
  showToast('행 삭제됨');
}

function addRow(id) {
  const dataKey = { 'monthly-plan': 'monthlyPlan' }[id];
  if (!dataKey) return;
  const data = DATA[dataKey];
  const isMonthly = id === 'monthly-plan';

  // If in edit mode, save first
  if (editStates[id]) {
    toggleEdit(id); // save
  }

  data.rows.push(['', '시즌', '', '']);
  renderTable(id, data, { monthGroup: isMonthly });
  toggleEdit(id); // enter edit mode
  showToast('새 행 추가됨 — 내용을 입력하세요');
}

// ── CSV DOWNLOAD ──
function downloadCSV(id, filename) {
  const dataKey = { 'mkt-types': 'marketingTypes', 'monthly-plan': 'monthlyPlan', 'txn-types': 'transactionTypes' }[id];
  const data = DATA[dataKey];
  let csv = data.headers.map(h => `"${h}"`).join(',') + '\n';
  data.rows.forEach(r => {
    csv += r.map(c => `"${c.replace(/"/g, '""')}"`).join(',') + '\n';
  });

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `${filename}.csv`;
  link.click();
  showToast(`${filename}.csv 다운로드 완료`);
}

// ── TOAST ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── INIT ──
renderTable('mkt-types', DATA.marketingTypes);
renderTips('marketing-tips', DATA.marketingTips);
renderTable('monthly-plan', DATA.monthlyPlan, { monthGroup: true });
renderTable('txn-types', DATA.transactionTypes);
renderTips('transaction-tips', DATA.transactionTips);
</script>
