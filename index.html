<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATCHTABLE Global — App Push Plan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f6fa;
    color: #2d3436;
    line-height: 1.6;
  }
  .header {
    background: #fff;
    border-bottom: 1px solid #e9ecef;
    padding: 28px 40px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .header p { font-size: 13px; color: #868e96; margin-top: 4px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

  .section {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e9ecef;
    padding: 28px;
    margin-bottom: 24px;
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .section-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .section-desc { font-size: 12px; color: #868e96; }

  .btn {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid #dee2e6;
    background: #fff;
    color: #495057;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
  }
  .btn:hover { background: #f8f9fa; }
  .btn-primary { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .btn-primary:hover { background: #2d2d44; }
  .btn-danger { color: #c92a2a; border-color: #ffc9c9; }
  .btn-danger:hover { background: #fff5f5; }
  .btn-group { display: flex; gap: 6px; flex-shrink: 0; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table thead th {
    background: #f8f9fa;
    font-weight: 600;
    color: #495057;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 2px solid #dee2e6;
    white-space: nowrap;
  }
  .data-table tbody td {
    padding: 9px 12px;
    text-align: left;
    border-bottom: 1px solid #f1f3f5;
    white-space: pre-line;
  }
  .data-table tbody tr:hover td { background: #f8f9fa; }

  /* editable cell */
  .data-table td[contenteditable="true"] {
    outline: none;
    border: 1px solid #d0ebff;
    background: #f0f7ff !important;
    border-radius: 2px;
  }
  .data-table.editing td { cursor: text; }
  .data-table.editing tr:hover td { background: #f0f7ff; }

  /* tip box */
  .tip-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }
  .tip-card {
    background: #f8f9fa;
    border: 1px solid #e9ecef;
    border-radius: 8px;
    padding: 16px;
  }
  .tip-card strong {
    display: block;
    font-size: 13px;
    color: #1a1a2e;
    margin-bottom: 4px;
  }
  .tip-card span {
    font-size: 12px;
    color: #868e96;
  }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1a1a2e; color: #fff; padding: 12px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

      </div>

    </div>

// ── RENDER ──
function renderTable(id, data) {
  const table = document.getElementById(id);
  let html = '<thead><tr>';
  data.headers.forEach(h => { html += `<th>${h}</th>`; });
  html += '</tr></thead><tbody>';

  data.rows.forEach((r, ri) => {
    html += `<tr data-row="${ri}">`;
    r.forEach((c, ci) => {
      html += `<td data-col="${ci}">${c}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function renderTips(id, tips) {
  const el = document.getElementById(id);
  el.innerHTML = tips.map(t => `<div class="tip-card"><strong>${t[0]}</strong><span>${t[1]}</span></div>`).join('');
}

// ── EDIT MODE ──
const editStates = {};

function toggleEdit(id) {
  const table = document.getElementById(id);
  const isEditing = editStates[id];
  const dataKey = { 'behavior-cases': 'behaviorCases', 'ops-cases': 'opsCases', 'country-cases': 'countryCases' }[id];
  const data = DATA[dataKey];

  if (isEditing) {
    const tbody = table.querySelector('tbody');
    const dataRows = tbody.querySelectorAll('tr');
    dataRows.forEach((tr, ri) => {
      tr.querySelectorAll('td').forEach(td => {
        const ci = parseInt(td.dataset.col);
        if (ci === undefined || isNaN(ci)) return;
        data.rows[ri][ci] = td.textContent.trim();
      });
    });
    renderTable(id, data);
    table.classList.remove('editing');
    editStates[id] = false;
    showToast('저장 완료');
  } else {
    table.classList.add('editing');
    const tbody = table.querySelector('tbody');
    const dataRows = tbody.querySelectorAll('tr');
    dataRows.forEach((tr) => {
      tr.querySelectorAll('td').forEach(td => {
        td.contentEditable = 'true';
        const badgeEl = td.querySelector('.badge');
        if (badgeEl) td.textContent = badgeEl.textContent;
      });
    });
    editStates[id] = true;
    showToast('수정 모드 — 셀을 클릭해서 편집하세요');
  }

  const btn = table.closest('.section').querySelector('.btn');
  btn.textContent = editStates[id] ? '저장' : '수정';
  if (editStates[id]) { btn.classList.add('btn-primary'); } else { btn.classList.remove('btn-primary'); }
}

// ── CSV DOWNLOAD ──
function downloadCSV(id, filename) {
  const dataKey = { 'behavior-cases': 'behaviorCases', 'ops-cases': 'opsCases', 'country-cases': 'countryCases' }[id];
  const data = DATA[dataKey];
  let csv = data.headers.map(h => `"${h}"`).join(',') + '\n';
  data.rows.forEach(r => {
    csv += r.map(c => `"${c.replace(/"/g, '""')}"`).join(',') + '\n';
  });

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `${filename}.csv`;
  link.click();
  showToast(`${filename}.csv 다운로드 완료`);
}

// ── TOAST ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── INIT ──
renderTable('behavior-cases', DATA.behaviorCases);
renderTable('ops-cases', DATA.opsCases);
renderTable('country-cases', DATA.countryCases);
renderTips('marketing-tips', DATA.marketingTips);
</script>
